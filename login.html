<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="login_style.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Amazon Login</title>
</head>

<body>

    <main class="container">

        <!-- Left Side -->
        <div class="left-section">

            <img src="amazon_logo.png"
                alt="amazon logo"
                class="logo">

            <h1>Welcome Back</h1>

            <p class="sign-in">
                Sign in to continue shopping
            </p>

            <p class="greet">
                Millions of products • Fast delivery • Best deals
            </p>

            <img class="shopping-image"
                src="Gemini_Generated_Image_wt1umkwt1umkwt1u.png"
                alt="shopping image">

            <!-- Icons -->
            <div class="icons">

                <i class="fa-solid fa-rectangle-list"></i>

                <i class="fa-solid fa-truck-fast"></i>

                <i class="fa-brands fa-cc-amazon-pay"></i>

                <i class="fa-solid fa-stopwatch"></i>

            </div>

        </div>

        <!-- Right Side -->
        <div class="right-section">

            <h2>Login</h2>

            <input type="email"
                placeholder="Enter Email">

            <input type="password"
                placeholder="Enter Password">

            <button>
                Login
            </button>
            <br><br>
            <h3>continue with this</h3>
            <br><br>
            <div class="options">
            <img class="google" src="https://imagedelivery.net/4Iq_5OuN3Oq3QRRKSY6D4w/episodes_og_google/main" alt="google" height="50px" width="50px">
            <img class="facebook" src="https://static.vecteezy.com/system/resources/thumbnails/018/930/476/small_2x/facebook-logo-facebook-icon-transparent-free-png.png" alt="facebook" height="50px" width="50px">
            <img class="amazon" src="https://1000logos.net/wp-content/uploads/2016/10/Amazon-logo-meaning.jpg" alt="amazon" height="50px" width="50px">
            <img class="twitter" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQwYG4azEl9wGw5TJHa2ct7hKic_VsexIUDlQ&s" alt="twitter" height="50px" width="50px">
            </div>
        </div>

    </main>

</body>
</html>
